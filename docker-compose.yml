x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: SequentialExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
    AIRFLOW__WEBSERVER__SECRET_KEY: local-dev-secret-key
    PYTHONPATH: /opt/airflow/src
    SQL_PATH: /opt/airflow/sql/snowflake
    NASDAQ_SYMBOL_LIMIT: ${NASDAQ_SYMBOL_LIMIT:-25}
    LOAD_START_DATE: ${LOAD_START_DATE:-2024-01-01}
    ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
    ALPHA_VANTAGE_OUTPUTSIZE: ${ALPHA_VANTAGE_OUTPUTSIZE:-compact}
    ALPHA_VANTAGE_API_PAUSE_SECONDS: ${ALPHA_VANTAGE_API_PAUSE_SECONDS:-12.5}
    ALPHA_VANTAGE_TIMEOUT_SECONDS: ${ALPHA_VANTAGE_TIMEOUT_SECONDS:-30}
    SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT:-}
    SNOWFLAKE_USER: ${SNOWFLAKE_USER:-}
    SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD:-}
    SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE:-NASDAQ_ELT_ROLE}
    SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE:-NASDAQ_ELT_WH}
    SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE:-NASDAQ_MARKET_DATA}
    _PIP_ADDITIONAL_REQUIREMENTS: "-r /opt/airflow/requirements.txt"
  volumes:
    - airflow-home:/opt/airflow
    - ./airflow/dags:/opt/airflow/dags
    - ./config:/opt/airflow/config
    - ./sql:/opt/airflow/sql
    - ./src:/opt/airflow/src
    - ./requirements.txt:/opt/airflow/requirements.txt
    - ./logs:/opt/airflow/logs

services:
  airflow-init:
    <<: *airflow-common
    container_name: nasdaq-market-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Mustafa \
          --lastname Dogan \
          --role Admin \
          --email admin@example.com \
          --password admin || true

  airflow-webserver:
    <<: *airflow-common
    container_name: nasdaq-market-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: nasdaq-market-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow-home:
